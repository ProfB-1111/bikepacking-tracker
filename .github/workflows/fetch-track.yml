name: Fetch Track

on:
  schedule:
    # Runs every 5 minutes (GitHub Actions' minimum cron interval).
    # Garmin's Feed/Share endpoint only ever exposes the device's current
    # position, not a history - any ping superseded by a newer one between
    # polls is lost for good. Polling this tightly is what keeps the gap
    # between "device pings" and "what we capture" as small as possible.
    # GitHub's cron is minimum-interval, not exact-timing - actual runs
    # may still lag a few minutes during high load.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}  # lets you trigger it manually from the Actions tab

jobs:
  fetch-track:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch new track points
        env:
          MAPSHARE_ID: "EBsMap"
        run: python scripts/fetch_track.py

      - name: Commit updated track.geojson if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/track.geojson
          git diff --quiet --cached || git commit -m "Update track.geojson [automated]"

          # Retry on push rejection: with a 5-min poll interval, overlapping
          # runs (or a Fetch Route run) can push to main in the gap between
          # this job's checkout and its own push.
          for i in 1 2 3 4 5; do
            if git push; then
              break
            fi
            echo "Push rejected, rebasing onto origin/main and retrying ($i/5)..."
            git fetch origin main
            git rebase origin/main
            sleep $((RANDOM % 5 + 1))
          done
