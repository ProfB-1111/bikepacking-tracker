name: Fetch Track

on:
  schedule:
    # Runs every 15 minutes. GitHub Actions cron is a minimum-interval
    # scheduler, not exact-timing - actual runs may lag a few minutes
    # during high load, which is fine for this use case.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}  # lets you trigger it manually from the Actions tab

jobs:
  fetch-track:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch new track points
        env:
          MAPSHARE_ID: "EBsMap"
        run: python scripts/fetch_track.py

      - name: Commit updated track.geojson if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/track.geojson
          git diff --quiet --cached || git commit -m "Update track.geojson [automated]"
          git push
